<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </radialGradient>
    <radialGradient id="vinyl" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2A2A2A"/>
      <stop offset="30%" stop-color="#1A1A1A"/>
      <stop offset="60%" stop-color="#222222"/>
      <stop offset="100%" stop-color="#111111"/>
    </radialGradient>
    <radialGradient id="label" cx="45%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#E8B84B"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </radialGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.04"/>
    </linearGradient>
  </defs>

  <!-- Background with rounded corners for app icon -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Vinyl disc body -->
  <circle cx="256" cy="256" r="210" fill="url(#vinyl)"/>

  <!-- Outer rim -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#C9A84C" stroke-width="2.5" stroke-opacity="0.6"/>

  <!-- Grooves -->
  <circle cx="256" cy="256" r="195" fill="none" stroke="#333" stroke-width="0.5" stroke-opacity="0.5"/>
  <circle cx="256" cy="256" r="185" fill="none" stroke="#2E2E2E" stroke-width="0.5" stroke-opacity="0.4"/>
  <circle cx="256" cy="256" r="175" fill="none" stroke="#333" stroke-width="0.5" stroke-opacity="0.5"/>
  <circle cx="256" cy="256" r="165" fill="none" stroke="#2E2E2E" stroke-width="0.5" stroke-opacity="0.4"/>
  <circle cx="256" cy="256" r="155" fill="none" stroke="#333" stroke-width="0.5" stroke-opacity="0.5"/>
  <circle cx="256" cy="256" r="145" fill="none" stroke="#2E2E2E" stroke-width="0.5" stroke-opacity="0.4"/>
  <circle cx="256" cy="256" r="135" fill="none" stroke="#333" stroke-width="0.5" stroke-opacity="0.5"/>
  <circle cx="256" cy="256" r="125" fill="none" stroke="#2E2E2E" stroke-width="0.5" stroke-opacity="0.4"/>
  <circle cx="256" cy="256" r="115" fill="none" stroke="#333" stroke-width="0.5" stroke-opacity="0.5"/>
  <circle cx="256" cy="256" r="105" fill="none" stroke="#2E2E2E" stroke-width="0.5" stroke-opacity="0.4"/>
  <circle cx="256" cy="256" r="95" fill="none" stroke="#333" stroke-width="0.5" stroke-opacity="0.5"/>

  <!-- Label area -->
  <circle cx="256" cy="256" r="75" fill="url(#label)"/>
  <circle cx="256" cy="256" r="75" fill="none" stroke="#B8983C" stroke-width="1.5"/>

  <!-- Label inner ring detail -->
  <circle cx="256" cy="256" r="60" fill="none" stroke="#B8983C" stroke-width="0.8" stroke-opacity="0.5"/>

  <!-- Label text "VITROLA" -->
  <text x="256" y="248" text-anchor="middle" font-family="serif" font-weight="bold" font-size="22" fill="#0A0A0A" letter-spacing="4">VITROLA</text>
  <line x1="220" y1="255" x2="292" y2="255" stroke="#0A0A0A" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="256" y="270" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#0A0A0A" fill-opacity="0.6" letter-spacing="2">33 RPM</text>

  <!-- Spindle hole -->
  <circle cx="256" cy="256" r="8" fill="#0A0A0A"/>
  <circle cx="256" cy="256" r="8" fill="none" stroke="#C9A84C" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Subtle light reflection across disc -->
  <ellipse cx="200" cy="200" rx="180" ry="180" fill="url(#shine)" clip-path="circle(210px at 256px 256px)"/>
</svg>
